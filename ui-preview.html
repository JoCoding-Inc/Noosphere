<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noosphere — UI Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --primary-light: #eef2ff;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    height: 48px;
    flex-shrink: 0;
  }
  .topbar-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #64748b;
    margin-right: 20px;
    letter-spacing: 0.05em;
  }
  .topbar-logo span { color: #6366f1; }
  .tab-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0 16px; height: 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    color: #64748b;
    background: none; border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: #e2e8f0; }
  .tab-btn.active { color: #e2e8f0; border-bottom-color: #6366f1; font-weight: 500; }
  .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Preview area */
  .preview-wrap { flex: 1; overflow: hidden; }
  .screen { display: none; width: 100%; height: 100%; }
  .screen.active { display: block; }
  .screen-inner {
    width: 100%; height: 100%;
    overflow-y: auto;
    background: #f8fafc;
  }

  /* Shared app styles */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 28px;
    border-bottom: 1px solid #e2e8f0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  .app-logo { display: flex; align-items: center; gap: 9px; }
  .logo-mark {
    width: 24px; height: 24px; border-radius: 6px;
    background: linear-gradient(135deg, #6366f1, #818cf8);
  }
  .logo-name { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: #1e293b; }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    color: #94a3b8; font-size: 13px; padding: 6px 12px; border-radius: 6px;
    font-family: 'DM Sans', sans-serif; transition: color 0.15s, background 0.15s;
  }
  .nav-btn:hover { background: #f8fafc; color: #1e293b; }

  /* Cards */
  .card {
    background: #fff; border: 1px solid #e2e8f0;
    border-radius: 12px; padding: 20px 24px;
    box-shadow: var(--shadow-card);
  }
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: #94a3b8; margin-bottom: 14px;
  }

  /* Buttons */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 28px; font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff; border: none; border-radius: 10px; cursor: pointer;
    box-shadow: 0 2px 12px rgba(99,102,241,0.35);
    font-family: 'DM Sans', sans-serif; letter-spacing: -0.01em;
  }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 11px 26px; font-size: 13px; color: #64748b;
    border: 1.5px solid #e2e8f0; border-radius: 9px;
    background: none; text-decoration: none; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-outline:hover { border-color: #cbd5e1; color: #1e293b; }

  /* Platform pill */
  .platform-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; font-size: 13px; border-radius: 8px;
    cursor: pointer; border: 1.5px solid; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .platform-pill.active {
    background: var(--primary); color: #fff;
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    font-weight: 600;
  }
  .platform-pill.inactive {
    background: #fff; color: #475569; border-color: #e2e8f0;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>

  </button>
  <button class="tab-btn" onclick="switchTab(this,'home')">

  <button class="tab-btn" onclick="switchTab(this,'simulate')">

  </button>
  <button class="tab-btn" onclick="switchTab(this,'result')">
    <span class="tab-dot" style="background:#ef4444"></span>Result (결과)
  </button>
</div>

<div class="preview-wrap">
  <div class="screen active" id="screen-landing"><div class="screen-inner" id="content-landing"></div></div>
  <div class="screen" id="screen-home"><div class="screen-inner" id="content-home"></div></div>
  <div class="screen" id="screen-simulate"><div class="screen-inner" id="content-simulate"></div></div>
  <div class="screen" id="screen-result"><div class="screen-inner" id="content-result"></div></div>
</div>

<script>
function switchTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('screen-' + id).classList.add('active');
}

        <span class="logo-name">Noosphere</span>
      </div>
      <button class="nav-btn">History</button>
    </div>`;
}
