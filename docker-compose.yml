services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/noosphere.db
      - SOURCES_DB_PATH=/app/data/noosphere_sources.db

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  db-data:
